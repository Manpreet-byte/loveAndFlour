<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- High-contrast, crisp favicon based on the provided "Love & Flour by Pooja" mark -->
  <rect width="64" height="64" rx="14" fill="#ffffff" />

  <g fill="#111111" text-anchor="middle">
    <text
      x="32"
      y="28"
      font-family="Georgia, 'Times New Roman', Times, serif"
      font-size="15.5"
      font-weight="500"
      letter-spacing="-0.4">
      Love &amp; Flour
    </text>

    <!-- Divider line -->
    <rect x="10" y="34" width="44" height="1.3" rx="0.65" fill="#111111" opacity="0.95" />

    <text
      x="32"
      y="48"
      font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="7.5"
      font-weight="700"
      letter-spacing="2.2">
      BY POOJA
    </text>
  </g>
</svg>

